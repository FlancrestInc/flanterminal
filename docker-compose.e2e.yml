services:
  app:
    build:
      context: .
      args:
        PUID: 1000
        PGID: 1000
        APP_PORT: 3000
    environment:
      APP_PORT: 3000
      APP_BIND_HOST: 0.0.0.0
      APP_BASE_PATH: ${E2E_APP_BASE_PATH:-/}
      APP_PUBLIC_URL: http://localhost:3000
      AUTH_MODE: local
      LOCAL_AUTH_USERNAME: ${E2E_LOCAL_USERNAME:-webterm}
      BCRYPT_COST: 10
      AUTH_IDLE_MINUTES: 60
      AUTH_ABSOLUTE_HOURS: 24
      AUTH_SESSION_MAX_COUNT: 32
      DEFAULT_SHELL: /bin/bash
      ALLOWED_SHELLS: /bin/bash
      DEFAULT_FONT_SIZE: 14
      MAX_FONT_SIZE: 32
      XTERM_SCROLLBACK: 10000
      MAX_XTERM_SCROLLBACK: 100000
      TMUX_HISTORY_LIMIT: 20000
      MAX_TMUX_HISTORY_LIMIT: 1000000
      MAX_STALE_SESSION_CLEANUP_HOURS: 8760
      SESSION_CLEANUP_INTERVAL_MINUTES: 15
      WS_HEARTBEAT_SECONDS: 5
      WS_MAX_BUFFER_BYTES: 1048576
      RESIZE_DEBOUNCE_MS: 50
      RECONNECT_MAX_SECONDS: 2
      LOG_LEVEL: info
      TZ: UTC
      HOME_DIR: /home/webterm
      DATA_DIR: /app/data
      SESSION_MAX_COUNT: 20
      TRUST_PROXY: 'false'
    volumes:
      - e2e-app:/app/data
      - e2e-home:/home/webterm
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
      - /run:rw,noexec,nosuid,nodev,size=1m,mode=0755,uid=1000,gid=1000
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    pids_limit: 256
    mem_limit: 512m
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:3000/health').then(async r=>{const v=await r.json();if(!r.ok||v.status!=='ok')process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      E2E_BASE_URL: http://localhost:3000/
      E2E_BASE_PATH: ${E2E_WORKSPACE_PATH:-/}
      E2E_MODE: ${E2E_MODE:-local}
      E2E_LOCAL_USERNAME: ${E2E_LOCAL_USERNAME:-webterm}
      E2E_LOCAL_PASSWORD: ${E2E_LOCAL_PASSWORD:-}
    depends_on:
      app:
        condition: service_healthy
    network_mode: service:app

volumes:
  e2e-app:
  e2e-home:

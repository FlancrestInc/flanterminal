services:
  app:
    image: flanterminal:phase3
    build:
      context: .
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
        APP_PORT: ${APP_PORT:-3000}
    environment:
      APP_PORT: ${APP_PORT:-3000}
      APP_BIND_HOST: ${APP_BIND_HOST:-0.0.0.0}
      APP_BASE_PATH: ${APP_BASE_PATH:-/}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOCAL_AUTH_USERNAME: ${LOCAL_AUTH_USERNAME:-webterm}
      LOCAL_AUTH_PASSWORD_FILE: /run/secrets/local_auth_password
      BCRYPT_COST: ${BCRYPT_COST:-12}
      AUTH_IDLE_MINUTES: ${AUTH_IDLE_MINUTES:-60}
      AUTH_ABSOLUTE_HOURS: ${AUTH_ABSOLUTE_HOURS:-24}
      AUTH_SESSION_MAX_COUNT: ${AUTH_SESSION_MAX_COUNT:-32}
      DEFAULT_SHELL: ${DEFAULT_SHELL:-/bin/bash}
      ALLOWED_SHELLS: ${ALLOWED_SHELLS:-/bin/bash}
      DEFAULT_FONT_SIZE: ${DEFAULT_FONT_SIZE:-14}
      MAX_FONT_SIZE: ${MAX_FONT_SIZE:-32}
      XTERM_SCROLLBACK: ${XTERM_SCROLLBACK:-10000}
      MAX_XTERM_SCROLLBACK: ${MAX_XTERM_SCROLLBACK:-100000}
      TMUX_HISTORY_LIMIT: ${TMUX_HISTORY_LIMIT:-20000}
      MAX_TMUX_HISTORY_LIMIT: ${MAX_TMUX_HISTORY_LIMIT:-1000000}
      MAX_STALE_SESSION_CLEANUP_HOURS: ${MAX_STALE_SESSION_CLEANUP_HOURS:-8760}
      SESSION_CLEANUP_INTERVAL_MINUTES: ${SESSION_CLEANUP_INTERVAL_MINUTES:-15}
      WS_HEARTBEAT_SECONDS: ${WS_HEARTBEAT_SECONDS:-30}
      WS_MAX_BUFFER_BYTES: ${WS_MAX_BUFFER_BYTES:-1048576}
      RESIZE_DEBOUNCE_MS: ${RESIZE_DEBOUNCE_MS:-100}
      RECONNECT_MAX_SECONDS: ${RECONNECT_MAX_SECONDS:-15}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
      HOME_DIR: /home/webterm
      DATA_DIR: /app/data
      SESSION_MAX_COUNT: ${SESSION_MAX_COUNT:-10}
      TRUST_PROXY: ${TRUST_PROXY:-false}
    ports:
      - '${HOST_BIND_ADDRESS:-127.0.0.1}:${HOST_PORT:-3000}:${APP_PORT:-3000}'
    volumes:
      - app-data:/app/data
      - webterm-home:/home/webterm
    secrets:
      - source: local_auth_password
        target: local_auth_password
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
      - /run:rw,noexec,nosuid,nodev,size=1m,mode=0755,uid=${PUID:-1000},gid=${PGID:-1000}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:'+process.env.APP_PORT+'/health').then(async r=>{const v=await r.json();if(!r.ok||v.status!=='ok')process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  app-data:
  webterm-home:

secrets:
  local_auth_password:
    file: ${LOCAL_AUTH_PASSWORD_FILE_HOST:-./secrets/local_auth_password}
